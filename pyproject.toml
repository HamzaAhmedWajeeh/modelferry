[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "modelferry"
version = "0.1.0"
description = "Pack Hugging Face models into chunked, hashed, self-verifying bundles for air-gapped transfer."
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "modelferry contributors" }]
keywords = ["huggingface", "air-gap", "offline", "sha256", "model-transfer"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Topic :: System :: Archiving :: Packaging",
]
dependencies = [
    "typer>=0.12",
    "rich>=13",
    "huggingface_hub>=0.24",
]

[project.scripts]
modelferry = "modelferry.cli:main"

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.6",
]

[tool.hatch.build.targets.wheel]
packages = ["src/modelferry"]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
markers = [
    "network: test requires network access (deselect with -m 'not network')",
]
